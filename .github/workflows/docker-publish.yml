# Build Docker image and push to GitHub Container Registry (ghcr.io)
# Requires packages: write (default GITHUB_TOKEN in the same repo usually has this)

name: Docker CI/CD

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish image to GHCR (push). If false, build will run without pushing.'
        required: false
        default: false
        type: boolean

# One active run per ref (tag or branch). Queue newer runs instead of canceling an
# in-flight publish — avoids overlapping GHCR pushes / duplicate work on the same ref.
concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Docker config checks
        run: npm run docker:check

      - name: Production build check
        env:
          JWT_SECRET: ci-build-placeholder
        run: npm run build

  docker:
    name: Build and publish image
    runs-on: ubuntu-latest
    needs: quality
    env:
      DO_PUSH: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Image name (lowercase, required by GHCR)
        run: echo "IMAGE_NAME=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: '.trivyignore'

      - name: Build local image for security scan
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: web-social-e1:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # node-pkg still flags Next vendored deps under next/dist/compiled; skip-dirs does not
      # suppress merged node-pkg findings. Use .trivyignore with exp: (see file comments).
      - name: Scan container image vulnerabilities
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: 'web-social-e1:scan'
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          scanners: 'vuln'
          trivyignores: '.trivyignore'

      - name: Log in to GHCR
        if: env.DO_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push (main/tags/manual)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ env.DO_PUSH }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  cleanup:
    name: Cleanup untagged GHCR versions
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'workflow_dispatch' || inputs.publish
    permissions:
      packages: write
      contents: read
    steps:
      - name: Delete old untagged package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          min-versions-to-keep: 20
          delete-only-untagged-versions: true
